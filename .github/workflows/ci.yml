name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # 只装核心依赖（不装 LLM/数据库 client，纯函数测试不需要）
          pip install fastapi==0.115.0 pydantic==2.9.2 pydantic-settings==2.6.0 \
                      python-multipart httpx pypdf pytest pytest-asyncio
      - name: Run pytest
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests/test_aggregator_pure.py tests/test_schemas_validation.py -v

  frontend-build:
    name: Frontend build + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build (含 vue-tsc 类型检查)
        working-directory: frontend
        run: npm run build
