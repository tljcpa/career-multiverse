# ===== 春招平行宇宙 · Nginx Upstream 配置（多后端负载均衡） =====
# 用法:
#   1. 把 BACKEND_NODES 改成实际后端 IP:PORT 列表
#   2. cp 到 /etc/nginx/sites-available/multiverse
#   3. nginx -t && systemctl reload nginx
#
# 负载均衡策略: least_conn（最少连接数，适合 LLM 长请求场景）
# 健康检查: nginx 原生 passive health check（失败 3 次标记 down 30s）

upstream backend_cluster {
    # 负载均衡策略: least_conn —— 长耗时 LLM 请求下最公平
    least_conn;
    # 被动健康检查: 30s 内失败 3 次 → 摘除 30s
    # nginx 开源版无 active health check，plus 才有；这里用 passive 足够

    # ===== 后端节点列表（部署时按实际 IP 改） =====
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s weight=1;
    # server 10.0.0.2:8000 max_fails=3 fail_timeout=30s weight=1;
    # server 10.0.0.3:8000 max_fails=3 fail_timeout=30s weight=1;

    # 长连接复用（减少 TCP 握手开销）
    keepalive 16;
}

# ===== HTTP → HTTPS 重定向 =====
server {
    listen 80;
    server_name multiverse.zdwktlj.top;

    # ACME (Let's Encrypt) 验证路径直通，不重定向
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS 主站 =====
server {
    listen 443 ssl;
    http2 on;
    server_name multiverse.zdwktlj.top;

    # SSL 证书（由 certbot 自动管理——不要手动改以下两行）
    ssl_certificate     /etc/letsencrypt/live/multiverse.zdwktlj.top/fullchain.pem;   # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/multiverse.zdwktlj.top/privkey.pem;     # managed by Certbot

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 文件上传大小限制
    client_max_body_size 10M;

    # gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # 安全头
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API 反代到 backend cluster
    location /api/ {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;

        # 请求头透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接复用（配对 upstream 的 keepalive）
        proxy_set_header Connection "";

        # LLM 调用可能很慢，给长超时
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # 缓冲（LLM 响应可能大）
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;
    }

    # 前端 SPA
    location / {
        root /var/www/multiverse;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存（Vite 构建产物带 hash，可以长缓存）
        location ~* \.(js|css|png|jpg|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
